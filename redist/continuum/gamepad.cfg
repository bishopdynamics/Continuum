//=======================================================================
//  gamepad.cfg  --  Continuum default CONTROLLER mapping
//
//  Ships in the always-mounted continuum/ overlay. The engine execs this
//  ONCE on a fresh install (when no unified.cfg exists yet), after the
//  game's own config chain, so these binds override whatever controller
//  defaults the game folders ship. They are then written into unified.cfg
//  on exit, becoming the persistent mapping; the in-game
//  Settings > Bindings UI can override any of it from then on.
//
//  GAMEPAD ONLY. Keyboard/mouse defaults still come from each game.
//
//  Button names use the Xbox layout (A/B/X/Y). On a PlayStation pad the
//  physical positions are the same: A=cross, B=circle, X=square,
//  Y=triangle, BACK=Share/Select, START=Options.
//
//  Handy actions to bind:
//    +attack +attack2 +use +jump +duck +speed(walk/sprint) +reload
//    +forward +back +moveleft +moveright +moveup(swim up) +movedown
//    +lookup +lookdown   invnext invprev lastinv   "slot1".."slot10"
//    impulse 100 (flashlight)   impulse 201 (spray)   pause cancelselect
//=======================================================================

// ---- face buttons ----
bind "A_BUTTON"     "+jump"          // A / cross
bind "B_BUTTON"     "impulse 100"    // B / circle    -> flashlight
bind "X_BUTTON"     "+reload"        // X / square
bind "Y_BUTTON"     "+use"           // Y / triangle

// ---- center buttons ----
bind "BACK"         "pause"          // View/Share  -> pause menu
bind "START"        "cancelselect"   // Menu/Options
bind "MODE"         ""               // Guide/PS button (usually leave empty)

// ---- shoulders & triggers ----
bind "L1_BUTTON"    "invprev"        // LB
bind "R1_BUTTON"    "invnext"        // RB

// Triggers arrive as LTRIGGER/RTRIGGER under SDL2; L2/R2 are aliases for
// pads that report them as plain buttons. Bind both so it works either way.
bind "LTRIGGER"     "+attack2"       // LT
bind "RTRIGGER"     "+attack"        // RT  -> primary fire
bind "L2_BUTTON"    "+attack2"
bind "R2_BUTTON"    "+attack"

// ---- sticks (click) ----
bind "STICK1"       "+duck"          // L3
bind "STICK2"       "+speed"         // R3

// ---- d-pad ----
bind "DPAD_UP"      "impulse 201"    // spray logo
bind "DPAD_DOWN"    "lastinv"        // last weapon
bind "DPAD_LEFT"    ""               // (unbound)
bind "DPAD_RIGHT"   ""               // (unbound)
