<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Game Picker (list + pane) — unified menu mockup</title>
<link rel="stylesheet" href="style.css">
<style>
  .split-list .menu-item { padding: 19px 30px; font-size: 24px; }
  .split-list .menu-item .badge {
    font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
    color: #14110a; background: var(--accent);
    border-radius: 4px; padding: 3px 8px; margin-left: 14px;
    vertical-align: middle; text-transform: uppercase;
  }
</style>
</head>
<body data-back="01-root.html">
<div class="stage">
  <div class="backdrop" id="bd" style="background-image:url('assets/valve.png')"></div>
  <div class="vignette"></div>
  <div class="scanline"></div>

  <div class="screen-title">Game<small>Choose a campaign</small></div>

  <div class="split-list">
    <div class="menu-item focused" data-focusable data-href="03-game-page.html"
         data-bg="assets/valve.png" data-desc="The original. A research accident at the Black Mesa facility tears a hole between dimensions. 96 maps, fully streamed — zero loading screens.">
      Half-Life<span class="badge">Current</span>
    </div>
    <div class="menu-item" data-focusable data-bg="assets/gearbox.png"
         data-desc="Return to Black Mesa as Corporal Adrian Shephard, sent in to contain the incident. Gearbox, 1999 — 43 maps.">
      Opposing Force
    </div>
    <div class="menu-item" data-focusable data-bg="assets/bshift.png"
         data-desc="Security guard Barney Calhoun fights his way out of the facility. Gearbox, 2001 — 37 maps.">
      Blue Shift
    </div>
    <div class="menu-item" data-focusable data-bg="assets/hunger.png"
         data-desc="Neil Manke's classic horror trilogy. A quiet vacation in the countryside goes very wrong. 63 maps.">
      They Hunger
    </div>
    <div class="menu-item" data-focusable data-bg="assets/uplink.png"
         data-desc="The standalone demo chapter Valve cut from the main game. Short, dense, and mean. 10 maps.">
      Uplink
    </div>
    <div class="menu-item" data-focusable data-bg="assets/dayone.png"
         data-desc="The PC Gamer demo disc build — the first chapters of Half-Life as the world first saw them. 27 maps.">
      Day One
    </div>
  </div>

  <div class="split-pane">
    <div class="art" id="pane" style="background-image:url('assets/valve.png')"></div>
    <div class="desc" id="desc">The original. A research accident at the Black Mesa facility tears a hole between dimensions. 96 maps, fully streamed — zero loading screens.</div>
  </div>

  <div class="legend">
    <span class="pair"><span class="glyph a">A</span> Select</span>
    <span class="pair"><span class="glyph b">B</span> Back</span>
    <span class="spacer"></span>
    <span class="pair" style="color:var(--ink-faint)">Switching game restarts the engine</span>
  </div>
</div>
<script src="nav.js"></script>
<script>
  document.addEventListener('navfocus', (e) => {
    const el = e.detail;
    if (!el?.dataset.bg) return;
    document.getElementById('bd').style.backgroundImage = `url('${el.dataset.bg}')`;
    document.getElementById('pane').style.backgroundImage = `url('${el.dataset.bg}')`;
    document.getElementById('desc').textContent = el.dataset.desc;
  });
</script>
</body>
</html>
