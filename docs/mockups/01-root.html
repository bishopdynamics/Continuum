<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Root Menu — unified menu mockup</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="stage">
  <div class="backdrop" style="background-image:url('assets/valve.png')"></div>
  <div class="vignette"></div>
  <div class="scanline"></div>

  <div class="brand">
    <span class="lambda">&lambda;</span>
    <h1>Half-Life</h1>
    <span class="sub">Continuum Edition</span>
  </div>

  <div class="menu-col">
    <div class="menu-item focused" data-focusable data-href="02a-game-picker-cards.html">
      Game
      <span class="hint">Choose one of six campaigns to play</span>
    </div>
    <div class="menu-item" data-focusable data-href="04-config.html">
      Configuration
      <span class="hint">Video, audio &amp; controls — shared across every game</span>
    </div>
    <div class="menu-item" data-focusable>
      Quit
      <span class="hint">Exit to desktop</span>
    </div>
  </div>

  <div class="legend">
    <span class="pair"><span class="glyph a">A</span> Select</span>
    <span class="pair"><span class="glyph b">B</span> Back</span>
    <span class="spacer"></span>
    <span style="letter-spacing:0.2em; font-size:14px; color:var(--ink-faint)">XASH3D · CONTINUUM BUILD</span>
  </div>
</div>
<script src="nav.js"></script>
</body>
</html>
