<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Game Page — unified menu mockup</title>
<link rel="stylesheet" href="style.css">
</head>
<body data-back="02a-game-picker-cards.html">
<div class="stage">
  <div class="backdrop" style="background-image:url('assets/valve.png')"></div>
  <div class="vignette"></div>
  <div class="scanline"></div>

  <div class="game-title-block">
    <span class="lambda">&lambda;</span>
    <h2>Half-Life</h2>
    <div class="meta">Valve · 1998 · Streaming · 96 maps resident</div>
  </div>

  <!-- the game's own 4:3 art, fit inside, never stretched -->
  <div class="game-art-frame" style="background-image:url('assets/valve.png')"></div>

  <div class="action-col">
    <div class="menu-item focused" data-focusable>
      New Game
      <span class="hint">Start from the tram ride — c0a0</span>
    </div>
    <div class="menu-item" data-focusable>
      Load Game
      <span class="hint">12 saves · latest: Surface Tension, yesterday</span>
    </div>
    <div class="menu-item disabled" data-focusable>
      Save Game
      <span class="hint">Available while playing</span>
    </div>
    <div class="menu-item" data-focusable>
      Multiplayer
      <span class="hint">Browse servers or host your own</span>
    </div>
  </div>

  <div class="legend">
    <span class="pair"><span class="glyph a">A</span> Select</span>
    <span class="pair"><span class="glyph b">B</span> Back</span>
    <span class="pair"><span class="glyph y">Y</span> Quick Resume</span>
    <span class="spacer"></span>
    <span style="letter-spacing:0.2em; font-size:14px; color:var(--ink-faint)">XASH3D · CONTINUUM BUILD</span>
  </div>
</div>
<script src="nav.js"></script>
</body>
</html>
